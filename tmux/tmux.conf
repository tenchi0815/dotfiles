# ~/.config/tmux/tmux.conf: shared tmux configuration
#
# Environment-independent settings live here: key bindings, status-line
# layout, general options and plugins. Color values are kept in
# ~/.tmux.conf.local so each machine can be tuned after cloning the repo.
# Colors are referenced as user options via #{E:@name}; the "E:" forces
# recursive expansion so the semantic name resolves through the palette.

# Separator / powerline characters ❯❯❯
# ----------------------------------------------------------------------------------
# Glyphs used by the status line. Only the active ones are referenced below.
set -g @powerline_left_bold  ""
set -g @powerline_left_thin  ""
#set -g @powerline_right_bold ""
#set -g @powerline_right_thin ""

# Key bindings and mouse operations ❯❯❯
# ----------------------------------------------------------------------------------
# ❯❯ Reload configuration with prefix r
bind r source-file ~/.tmux.conf \; display "Reloaded!"

# ❯❯ Open new windows/splits in the current pane's path
bind c new-window
unbind %
bind | split-window -h -c '#{pane_current_path}'
unbind '"'
bind - split-window -v -c '#{pane_current_path}'

# ❯❯ Change the prefix key to C-q
set -g prefix C-q
unbind C-b
#bind C-w send-prefix

# ❯❯ Turn the mouse on, but without copy mode dragging
set -g mouse on
unbind -n MouseDrag1Pane
unbind -Tcopy-mode MouseDrag1Pane

# ❯❯ vim-like pane selection
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# ❯❯ vim keybindings in copy mode
setw -g mode-keys vi
bind -T copy-mode-vi v send -X begin-selection   # start selection with "v"
bind -T copy-mode-vi y send -X copy-selection    # copy with "y"
bind -T copy-mode-vi V send-keys -X select-line  # select line with "V"

# General settings ❯❯❯
# ----------------------------------------------------------------------------------
# ❯❯ Low escape-time so vim/nvim feels responsive inside tmux
set -sg escape-time 10

# ❯❯ Change the default $TERM to screen-256color
set -g default-terminal "screen-256color"

# ❯❯ TrueColor
set -ga terminal-overrides ",$TERM:Tc"
#set -ga terminal-overrides ",xterm-256color:RGB"

# ❯❯ Use the system clipboard
set -g set-clipboard on

# Status line layout ❯❯❯
# ----------------------------------------------------------------------------------
set -g status-position top
set -g status-style "bg=#{E:@bg_status},fg=#{E:@fg_status}"
set -g status-interval 15

# ❯❯ Right side: reset, then host info and clock
set -g status-right ""
set -ag status-right "#[fg=#{E:@fg_status}]#{@powerline_left_bold}#[reverse] "
#set -ag status-right "#{@nf_md_ip_network} #(hostname -I | awk '{print $1}') " # Local IP
set -ag status-right '#U@#H '
set -ag status-right "#{@powerline_left_thin} %F %R"
set -g status-right-length 120

# ❯❯ Left side: session name (highlighted while prefix is active)
set -g status-left "#[bg=#{E:@bg_status},bold]#{?client_prefix,#[reverse],}[#S] #[default]#[fg=#{E:@fg_left},nobold]|"
set -g status-left-length 100

# ❯❯ Window status format
set-window-option -g window-status-style "bg=default"
set-window-option -g window-status-separator " "
set-window-option -g window-status-format " #I:#W"
set-window-option -g window-status-current-format "#[fg=#{E:@fg_cwin}] #I:#W#{?window_flags,#{window_flags}, }#[default]"

set -g message-style "fg=#{E:@fg_status},bg=default"
set -g mode-style "fg=#{E:@fg_modestyle},bg=#{E:@bg_modestyle}"

# Pane border ❯❯❯
# ----------------------------------------------------------------------------------
set -g pane-active-border-style "fg=#{E:@fg_border_active}"
set -g pane-border-status off
set -g pane-border-format "#[fg=#{E:@fg_border}]#(~/tmux-git-prompt/tmux-git-prompt #{pane_current_path}) #[fg=#{E:@fg_status}]#(echo #{pane_current_path} | sed 's#$HOME#~#g') "
#set -g pane-border-format '#[fg=yellow]#(git -C #{pane_current_path} rev-parse --abbrev-ref HEAD)'

# ❯❯ git status in the status line (alternative to pane-border-format above)
#set -ag status-left "#[bg=#{E:@bg_status}]#(~/tmux-git-prompt/tmux-git-prompt #{pane_current_path})"

# ❯❯ If running tmux inside tmux ($TMUX is set), turn the status line red
%if #{TMUX}
set -g status-bg red
%endif

# Plugins ❯❯❯
# ----------------------------------------------------------------------------------
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
set -g @plugin 'soyuka/tmux-current-pane-hostname'
#set -g @plugin 'xamut/tmux-weather'
#set -g @tmux-weather-format "%l:%20+%t"
#set -g @tmux-weather-location "Tokyo"
#set -g @plugin 'b4b4r07/tmux-git-prompt'

# ❯❯ Other examples:
# set -g @plugin 'github_username/plugin_name'
# set -g @plugin 'github_username/plugin_name#branch'
# set -g @plugin 'git@github.com:user/plugin'

# Source device-local config (colors) ❯❯❯
# ----------------------------------------------------------------------------------
if-shell 'test -e "$XDG_CONFIG_HOME/tmux/tmux.local.conf"' 'source-file "$XDG_CONFIG_HOME/tmux/tmux.local.conf"'
if-shell 'test -e ~/.tmux.conf.local' 'source-file ~/.tmux.conf.local'

# ❯❯ Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
